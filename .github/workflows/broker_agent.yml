name: IPMI Broker Discovery Agent

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual trigger"

jobs:
  discover-brokers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IPMI broker discovery
        env:
          SERPAPI_KEY_PRIMARY: ${{ secrets.SERPAPI_KEY_PRIMARY }}
          SERPAPI_KEY_BACKUP:  ${{ secrets.SERPAPI_KEY_BACKUP }}
          OUTPUT_DIR: docs/data
          LOG_DIR: logs
        run: python broker_agent.py

      - name: Commit results back to repo
        run: |
          git config --global user.name "IPMI Bot"
          git config --global user.email "bot@ipmi-agent.com"
          git add docs/data/ logs/
          git diff --staged --quiet || git commit -m "🤖 Auto: broker leads update $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ipmi-broker-leads-${{ github.run_number }}
          path: docs/data/
          retention-days: 90
